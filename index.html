<!DOCTYPE html>
<html lang="en" data-mode="studio">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Parth's Cookbook - A personal high-protein cookbook and bar">
    <title>Parth's Cookbook</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Fragment+Mono&family=Shantell+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/motion.css">
    
    <!-- rough.js for sketch wobble -->
    <script src="https://cdn.jsdelivr.net/npm/roughjs@4.5.2/bundled/rough.min.js"></script>
</head>
<body>
    <header class="masthead">
        <h1 class="masthead-title">Parth's Cookbook</h1>
        <nav class="masthead-nav" aria-label="Main navigation">
            <a href="#/" class="nav-link" data-view="menu">Menu</a>
            <a href="#/tonight" class="nav-link" data-view="tonight">Tonight</a>
            <a href="#/fridge" class="nav-link" data-view="fridge">Fridge</a>
            <a href="#/planner" class="nav-link" data-view="planner">Planner</a>
            <a href="#/host" class="nav-link" data-view="host">Host</a>
        </nav>
        <div class="masthead-controls">
            <button class="search-trigger" aria-label="Search" data-shortcut="⌘K">
                <span class="search-icon">🔍</span>
            </button>
            <div class="mode-toggle" role="switch" aria-checked="true" aria-label="Toggle Studio/Reading mode">
                <span class="mode-label mode-label-studio">Studio</span>
                <span class="mode-label mode-label-reading">Reading</span>
            </div>
        </div>
    </header>

    <main id="app" class="app-main">
        <!-- Views render here -->
    </main>

    <nav class="mobile-tab-bar" aria-label="Mobile navigation">
        <a href="#/" class="tab-item" data-view="menu">
            <span class="tab-icon">⌂</span>
            <span class="tab-label">Menu</span>
        </a>
        <a href="#/tonight" class="tab-item" data-view="tonight">
            <span class="tab-icon">✦</span>
            <span class="tab-label">Tonight</span>
        </a>
        <a href="#/fridge" class="tab-item" data-view="fridge">
            <span class="tab-icon">❄</span>
            <span class="tab-label">Fridge</span>
        </a>
        <a href="#/planner" class="tab-item" data-view="planner">
            <span class="tab-icon">▦</span>
            <span class="tab-label">Plan</span>
        </a>
        <a href="#/host" class="tab-item" data-view="host">
            <span class="tab-icon">♥</span>
            <span class="tab-label">Host</span>
        </a>
    </nav>

    <div class="search-modal" hidden>
        <div class="search-modal-content">
            <input type="search" class="search-input" placeholder="Search dishes or tags..." autocomplete="off">
            <div class="search-results"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
