<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Parth's Cookbook - high protein, low calorie, Hyderabad">
<meta name="theme-color" content="#EDEDE7">
<title>Parth's Cookbook</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<!-- Bodoni Moda (display) + Fragment Mono (data) from Google -->
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;1,6..96,400;1,6..96,500&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
<!-- Switzer (body/UI) from Fontshare. Separate source on purpose - this is the link that was missing. -->
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/motion.css">
</head>
<body>

<header class="masthead">
  <div class="masthead-inner wrap">
    <a href="#/" class="wordmark">Parth's <em>Cookbook</em></a>
    <nav class="nav" aria-label="Main">
      <a href="#/" class="nav-link" data-view="menu">menu</a>
      <a href="#/tonight" class="nav-link" data-view="tonight">tonight</a>
      <a href="#/fridge" class="nav-link" data-view="fridge">fridge</a>
      <a href="#/planner" class="nav-link" data-view="planner">plan</a>
      <a href="#/host" class="nav-link" data-view="host">host</a>
      <button class="search-trigger" aria-label="Search dishes">
        <span class="kbd" aria-hidden="true">⌘K</span>
      </button>
    </nav>
  </div>
  <div class="colophon wrap" id="colophon"></div>
</header>

<main id="app" class="app-main wrap"></main>

<nav class="tabbar" aria-label="Main">
  <a href="#/" class="tab-item" data-view="menu">
    <svg class="tab-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M3 5h14M3 10h14M3 15h9"/></svg>
    <span>Menu</span>
  </a>
  <a href="#/tonight" class="tab-item" data-view="tonight">
    <svg class="tab-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M10 2.5l1.9 4.5 4.6.4-3.5 3 1.1 4.6L10 12.6 5.9 15l1.1-4.6-3.5-3 4.6-.4z"/></svg>
    <span>Tonight</span>
  </a>
  <a href="#/fridge" class="tab-item" data-view="fridge">
    <svg class="tab-icon" viewBox="0 0 20 20" aria-hidden="true"><rect x="4.5" y="2.5" width="11" height="15" rx="1.5"/><path d="M4.5 8h11M7.5 5v1.5M7.5 10.5V12"/></svg>
    <span>Fridge</span>
  </a>
  <a href="#/planner" class="tab-item" data-view="planner">
    <svg class="tab-icon" viewBox="0 0 20 20" aria-hidden="true"><rect x="3" y="4.5" width="14" height="13" rx="1.5"/><path d="M3 8.5h14M7 2.5v3M13 2.5v3"/></svg>
    <span>Plan</span>
  </a>
  <a href="#/host" class="tab-item" data-view="host">
    <svg class="tab-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M4 3.5h12l-5 6v5.5h2.5M11 15h-2.5M9 9.5l-5-6"/></svg>
    <span>Host</span>
  </a>
</nav>

<div class="search-modal" hidden>
  <div class="search-panel" role="dialog" aria-label="Search">
    <input type="search" class="search-input" placeholder="Dish, ingredient, or tag" autocomplete="off" spellcheck="false">
    <div class="search-results"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
